<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso Administrador – HelioAndes</title>

  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/adminlte/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/adminlte/dist/css/adminlte.min.css">

  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="hold-transition login-page" style="background:#f4f6f9;">

<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-header text-center">
      <h3><b>HelioAndes</b> Admin</h3>
      <span class="text-muted text-sm">Acceso restringido</span>
    </div>

    <div class="card-body">
      <p class="login-box-msg">Ingrese sus credenciales</p>

      <form id="formLogin">
        <div class="input-group mb-3">
          <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-user"></span></div>
          </div>
        </div>

        <div class="input-group mb-3">
          <input type="password" id="clave" class="form-control" placeholder="Contraseña" required>
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-lock"></span></div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">
              <i class="fas fa-arrow-right mr-1"></i> Ingresar
            </button>
          </div>
        </div>
      </form>

      <p class="mt-3 text-sm text-center">
        <a href="/" class="text-secondary">Volver al sitio público</a>
      </p>
    </div>
  </div>
</div>

<script>
  document.getElementById("formLogin").addEventListener("submit", function(e) {
    e.preventDefault();

    const usuario = document.getElementById("usuario").value.trim();
    const clave   = document.getElementById("clave").value.trim();

    if (usuario === "DUOC" && clave === "1234.abcd") {
      // Guardamos que está autenticado
      localStorage.setItem("helioAndesAuth", "yes");

      // Redirigir al dashboard
      window.location.href = "/admin/dashboard.html";
    } else {
      alert("Usuario o contraseña incorrectos");
    }
  });
</script>

</body>
</html>
